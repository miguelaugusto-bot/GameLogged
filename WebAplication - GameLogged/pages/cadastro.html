<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameLogged — Cadastro</title>
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/cadastro.css" />
</head>
<body>
  <div class="app-shell">
    <div class="mobile-card">
      <div class="page-content">

        <!-- Logo -->
        <div class="logo-icon">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#6c63ff"/>
                <stop offset="100%" stop-color="#e040fb"/>
              </linearGradient>
            </defs>
            <path d="M10 22C10 18 13 16 17 16H47C51 16 54 18 54 22V38C54 45 49 50 42 50H22C15 50 10 45 10 38V22Z"
                  stroke="url(#g1)" stroke-width="2.5" fill="none"/>
            <rect x="17" y="30" width="4" height="10" rx="1" fill="url(#g1)" opacity=".8"/>
            <rect x="14" y="33" width="10" height="4" rx="1" fill="url(#g1)" opacity=".8"/>
            <circle cx="44" cy="31" r="2.5" fill="url(#g1)" opacity=".9"/>
            <circle cx="49" cy="35" r="2.5" fill="url(#g1)" opacity=".9"/>
            <circle cx="44" cy="39" r="2.5" fill="url(#g1)" opacity=".9"/>
            <circle cx="39" cy="35" r="2.5" fill="url(#g1)" opacity=".9"/>
            <rect x="28" y="33" width="4" height="2" rx="1" fill="#5a5a80"/>
            <rect x="34" y="33" width="4" height="2" rx="1" fill="#5a5a80"/>
          </svg>
        </div>

        <!-- Title -->
        <h1 class="page-title">Bem-Vindo a <span class="text-gradient">GameLogged</span></h1>
        <p class="page-subtitle">Crie a seu cadastro jogador</p>

        <!-- Register Form -->
        <form id="registerForm" novalidate>

          <!-- Nome -->
          <div class="input-group">
            <span class="icon">
              <svg viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
              </svg>
            </span>
            <input type="text" class="input-field" id="nome" placeholder="Digite seu nome" autocomplete="given-name" />
          </div>

          <!-- Nickname -->
          <div class="input-group">
            <span class="icon">
              <svg viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M10 2a1 1 0 00-1 1v1a1 1 0 002 0V3a1 1 0 00-1-1zM4 4h3a3 3 0 006 0h3a2 2 0 012 2v9a2 2 0 01-2 2H4a2 2 0 01-2-2V6a2 2 0 012-2zm2.5 7a1.5 1.5 0 100-3 1.5 1.5 0 000 3zm2.45 4a2.5 2.5 0 10-4.9 0h4.9zM12 9a1 1 0 100 2h3a1 1 0 100-2h-3zm-1 4a1 1 0 011-1h2a1 1 0 110 2h-2a1 1 0 01-1-1z" clip-rule="evenodd"/>
              </svg>
            </span>
            <input type="text" class="input-field" id="nickname" placeholder="Digite o seu NickName" autocomplete="username" />
          </div>

          <!-- Date of birth -->
          <div class="input-group">
            <span class="icon">
              <svg viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z" clip-rule="evenodd"/>
              </svg>
            </span>
            <input type="text" class="input-field" id="dataNasc" placeholder="DD / MM / AAAA" maxlength="14" inputmode="numeric" />
          </div>

          <!-- Email -->
          <div class="input-group">
            <span class="icon">
              <svg viewBox="0 0 20 20" fill="currentColor">
                <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/>
                <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/>
              </svg>
            </span>
            <input type="email" class="input-field" id="email" placeholder="Digite seu e-mail" autocomplete="email" />
          </div>

          <!-- Password -->
          <div class="input-group">
            <span class="icon">
              <svg viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
              </svg>
            </span>
            <input type="password" class="input-field" id="senha" placeholder="Digite sua senha" autocomplete="new-password" />
            <button type="button" class="eye-toggle" id="eyeSenha" aria-label="Ver senha">
              <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
                <path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/>
                <path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/>
              </svg>
            </button>
          </div>

          <!-- Password hints -->
          <div class="password-hints" id="pwHints">
            <span id="hint-special" class="hint">✗ Pelo menos 1 caractere especial (! @ # $ %)</span>
            <span id="hint-upper"   class="hint">✗ Pelo menos 1 letra maiúscula (A-Z)</span>
            <span id="hint-length"  class="hint">✗ No mínimo 8 caracteres</span>
          </div>

          <!-- Confirm password -->
          <div class="input-group">
            <span class="icon">
              <svg viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
              </svg>
            </span>
            <input type="password" class="input-field" id="confirmarSenha" placeholder="Confirme a senha" autocomplete="new-password" />
            <button type="button" class="eye-toggle" id="eyeConfirm" aria-label="Ver senha">
              <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
                <path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/>
                <path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/>
              </svg>
            </button>
          </div>

          <!-- Referral code (optional) -->
          <div class="input-group">
            <span class="icon">
              <svg viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M17.707 9.293a1 1 0 010 1.414l-7 7a1 1 0 01-1.414 0l-7-7A.997.997 0 012 10V5a3 3 0 013-3h5c.256 0 .512.098.707.293l7 7zM5 6a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd"/>
              </svg>
            </span>
            <input type="text" class="input-field" id="referral" placeholder="YY - XXXXXX (código de indicação — opcional)" />
          </div>

          <!-- Terms -->
          <label class="terms-label" for="terms">
            <input type="checkbox" id="terms" />
            <span>
              Ao criar um cadastro, eu concordo com os
              <a href="#">Termos de Serviço</a> e a <a href="#">Política de Privacidade</a>.
            </span>
          </label>

          <button type="submit" class="btn btn-primary" style="margin-top:20px;">Cadastrar</button>
        </form>

        <!-- Login redirect -->
        <p class="auth-redirect">
          Já possui conta?
          <a href="login.html">Entrar</a>
        </p>

      </div><!-- /page-content -->
    </div><!-- /mobile-card -->
  </div><!-- /app-shell -->

  <script src="../js/cadastro.js"></script>
</body>
</html>
