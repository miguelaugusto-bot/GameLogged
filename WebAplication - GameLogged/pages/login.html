<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameLogged — Login</title>
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/login.css" />
</head>
<body>
  <div class="app-shell">
    <div class="mobile-card">
      <div class="page-content">

        <!-- Logo -->
        <div class="logo-icon">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#6c63ff"/>
                <stop offset="100%" stop-color="#e040fb"/>
              </linearGradient>
            </defs>
            <!-- Gamepad shape -->
            <path d="M10 22C10 18 13 16 17 16H47C51 16 54 18 54 22V38C54 45 49 50 42 50H22C15 50 10 45 10 38V22Z"
                  stroke="url(#g1)" stroke-width="2.5" fill="none"/>
            <!-- D-pad -->
            <rect x="17" y="30" width="4" height="10" rx="1" fill="url(#g1)" opacity=".8"/>
            <rect x="14" y="33" width="10" height="4" rx="1" fill="url(#g1)" opacity=".8"/>
            <!-- Buttons -->
            <circle cx="44" cy="31" r="2.5" fill="url(#g1)" opacity=".9"/>
            <circle cx="49" cy="35" r="2.5" fill="url(#g1)" opacity=".9"/>
            <circle cx="44" cy="39" r="2.5" fill="url(#g1)" opacity=".9"/>
            <circle cx="39" cy="35" r="2.5" fill="url(#g1)" opacity=".9"/>
            <!-- Start/Select -->
            <rect x="28" y="33" width="4" height="2" rx="1" fill="#5a5a80"/>
            <rect x="34" y="33" width="4" height="2" rx="1" fill="#5a5a80"/>
          </svg>
        </div>

        <!-- Title -->
        <h1 class="page-title">Bem-Vindo a <span class="text-gradient">GameLogged</span></h1>
        <p class="page-subtitle">Faça login na sua conta para continuar</p>

        <!-- Form -->
        <form id="loginForm" novalidate>
          <div class="input-group">
            <span class="icon">
              <svg viewBox="0 0 20 20" fill="currentColor">
                <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/>
                <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/>
              </svg>
            </span>
            <input type="email" class="input-field" id="email" placeholder="Digite seu e-mail" autocomplete="email" />
          </div>

          <div class="input-group">
            <span class="icon">
              <svg viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
              </svg>
            </span>
            <input type="password" class="input-field" id="password" placeholder="Digite sua senha" autocomplete="current-password" />
            <button type="button" class="eye-toggle" id="eyeToggle" aria-label="Ver senha">
              <svg id="eyeIcon" viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
                <path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/>
                <path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/>
              </svg>
            </button>
          </div>

          <div class="check-row">
            <label class="check-label">
              <input type="checkbox" id="remember" />
              Lembrar de mim
            </label>
            <a href="#" class="forgot-link">Esqueceu a senha?</a>
          </div>

          <button type="submit" class="btn btn-primary">Entrar</button>
        </form>

        <!-- OAuth -->
        <div class="divider">ou continue com</div>

        <div class="oauth-stack">
          <button class="btn btn-google" type="button">
            <svg width="20" height="20" viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Google
          </button>

          <button class="btn btn-discord" type="button">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
              <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.03.056a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
            </svg>
            Discord
          </button>
        </div>

        <!-- Register -->
        <p class="auth-redirect">
          Não possui conta ainda?
          <a href="cadastro.html">Criar conta</a>
        </p>

      </div><!-- /page-content -->
    </div><!-- /mobile-card -->
  </div><!-- /app-shell -->

  <script src="../js/login.js"></script>
</body>
</html>
